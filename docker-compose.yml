version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: quantmind-mysql
    environment:
      MYSQL_ROOT_PASSWORD: quantmind_root_2026
      MYSQL_DATABASE: quantmind
      MYSQL_USER: quantmind
      MYSQL_PASSWORD: quantmind123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - quantmind-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: quantmind-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - quantmind-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quantmind-backend
    environment:
      SERVER_PORT: "8080"
      GIN_MODE: release
      DB_DRIVER: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: quantmind
      DB_PASSWORD: quantmind123
      DB_NAME: quantmind
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      JWT_SECRET: quantmind-secret-key-2026
      ADMIN_USER: admin
      ADMIN_PASSWORD: "Admin@2026!"
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - quantmind-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quantmind-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - quantmind-net

volumes:
  mysql_data:
  rabbitmq_data:

networks:
  quantmind-net:
    driver: bridge
